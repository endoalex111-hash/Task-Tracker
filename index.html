<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <meta name="description" content="This is a Task Tracker Project.">
    <title>Task Tracker</title>
    <link rel="stylesheet" href="style.css"/>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
</head>
<body>

    <div class="container">

        <h2>Task Tracker</h2>

        <div class="input-container">

            <input type="text" id="taskInput" placeholder="Start writing and press enter to create task">
            <span class="enter-btn material-symbols-rounded">keyboard_return</span>

        </div>

        <ul id="taskList"></ul>

    </div>

    <script src="script.js"></script>
</body>
</html>
